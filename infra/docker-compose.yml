# Local dev infrastructure for the AoE2 telemetry pipelines.
#
#   docker compose -f infra/docker-compose.yml up -d
#   docker compose -f infra/docker-compose.yml down
#
#   * chromadb        — Pipeline 1 staging store (raw match-log chunks), :8000
#   * dynamodb-local  — Pipeline 2 timeline store (DynamoDB Local),      :8001
#   * minio           — Pipeline 3 profile store (S3-compatible),       :9000
#                        (console UI at :9001, login localadmin/localpassword123)
#
# Data persists in ./chroma-data, ./dynamo-data, and ./minio-data (all gitignored).

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: aoe-chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./chroma-data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    restart: unless-stopped

  # DynamoDB Local — a drop-in local implementation of the DynamoDB API. The
  # pipeline talks to it via boto3 with endpoint_url=http://localhost:8001; the
  # SAME code points at real AWS when that endpoint_url is removed (see
  # pipeline/config.py DYNAMODB_ENDPOINT_URL).
  #
  # -sharedDb keeps a single shared database file regardless of credentials/region
  # so data is stable across runs; -dbPath persists it to the mounted volume.
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: aoe-dynamodb
    ports:
      - "8001:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/home/dynamodblocal/data"]
    working_dir: /home/dynamodblocal
    volumes:
      - ./dynamo-data:/home/dynamodblocal/data
    user: root
    restart: unless-stopped

  # MinIO — a drop-in local implementation of the S3 API. Pipeline 3 talks to
  # it via boto3 with endpoint_url=http://localhost:9000 (default config in
  # pipeline/config.py S3_ENDPOINT_URL); the SAME code points at real AWS S3
  # when that endpoint_url is removed (set S3_ENDPOINT_URL="" and provide real
  # AWS credentials — no code changes needed).
  minio:
    image: minio/minio
    container_name: aoe-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: localadmin
      MINIO_ROOT_PASSWORD: localpassword123
    volumes:
      - ./minio-data:/data
    restart: unless-stopped
